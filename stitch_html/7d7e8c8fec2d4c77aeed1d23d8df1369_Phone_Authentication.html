<script>
        // Micro-interaction for input focus effects
        const inputField = document.querySelector('input[type="tel"]');
        const container = inputField.parentElement;

        inputField.addEventListener('focus', () => {
            container.classList.add('scale-[1.01]');
        });

        inputField.addEventListener('blur', () => {
            container.classList.remove('scale-[1.01]');
        });

        // Simple button ripple effect simulation
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function(e) {
                let x = e.clientX - e.target.offsetLeft;
                let y = e.clientY - e.target.offsetTop;
                let ripples = document.createElement('span');
                ripples.style.left = x + 'px';
                ripples.style.top = y + 'px';
                this.appendChild(ripples);
                setTimeout(() => { ripples.remove() }, 1000);
            });
        });
    </script>
