</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-stack-sm tracking-tight text-center">

<script>
        // Simple Interaction logic
        document.querySelector('button').addEventListener('click', () => {
            // Placeholder for navigation interaction
            console.log('Navigating to Sign Up flow...');
        });

        // Add subtle parallax effect on device orientation if supported (mobile)
        window.addEventListener('deviceorientation', (event) => {
            const logo = document.querySelector('.logo-glow');
            if (logo) {
                const moveX = (event.gamma || 0) / 10;
                const moveY = (event.beta || 0) / 10;
                logo.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
