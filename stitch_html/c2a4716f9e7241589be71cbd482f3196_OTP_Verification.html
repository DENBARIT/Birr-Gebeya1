<!-- Script for OTP Focus Logic & Timer -->
<script>
        // OTP Focus Forward/Backward Logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Simple Countdown Timer
        let timeLeft = 45;
        const timerLabel = document.getElementById('timer-label');
        const resendBtn = document.getElementById('resend-btn');

        const countdown = setInterval(() => {
            timeLeft--;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerLabel.innerText = `Resend in ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerLabel.innerText = "Didn't receive a code?";
                resendBtn.disabled = false;
                resendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                resendBtn.classList.add('hover:underline');
            }
        }, 1000);
    </script>
